<!DOCTYPE html>
<html>
<head>
    <title>Server Connection Test</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .box { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Server Test</h1>
    
    <div class="box">
        <h2>Step 1: Test if server is responding</h2>
        <button onclick="testConnection()">Test Connection</button>
        <p id="test1"></p>
    </div>
    
    <div class="box">
        <h2>Step 2: Send a message</h2>
        <input type="text" id="msgInput" placeholder="Enter message...">
        <button onclick="sendMsg()">Send</button>
        <p id="test2"></p>
    </div>
    
    <div class="box">
        <h2>Step 3: View messages</h2>
        <button onclick="getMessages()">Load Messages</button>
        <pre id="test3"></pre>
    </div>

    <script>
        async function testConnection() {
            const p = document.getElementById('test1');
            p.innerHTML = '⏳ Testing...';
            try {
                console.log('Fetching /api/messages');
                const response = await fetch('http://localhost:3000/api/messages');
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Data:', data);
                p.innerHTML = '<span class="success">✓ Server is responding! Messages: ' + JSON.stringify(data) + '</span>';
            } catch (error) {
                console.error('Error:', error);
                p.innerHTML = '<span class="error">✗ Failed to connect: ' + error.message + '</span>';
            }
        }

        async function sendMsg() {
            const p = document.getElementById('test2');
            const msg = document.getElementById('msgInput').value;
            
            if (!msg) {
                p.innerHTML = '<span class="error">Please enter a message</span>';
                return;
            }
            
            p.innerHTML = '⏳ Sending...';
            try {
                console.log('Sending message:', msg);
                const response = await fetch('http://localhost:3000/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success) {
                    p.innerHTML = '<span class="success">✓ Message sent! ' + JSON.stringify(data.data) + '</span>';
                    document.getElementById('msgInput').value = '';
                    getMessages();
                } else {
                    p.innerHTML = '<span class="error">✗ Error: ' + data.error + '</span>';
                }
            } catch (error) {
                console.error('Error:', error);
                p.innerHTML = '<span class="error">✗ Failed: ' + error.message + '</span>';
            }
        }

        async function getMessages() {
            const pre = document.getElementById('test3');
            pre.innerHTML = '⏳ Loading...';
            try {
                console.log('Fetching messages');
                const response = await fetch('http://localhost:3000/api/messages');
                const data = await response.json();
                console.log('Messages:', data);
                pre.innerHTML = JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Error:', error);
                pre.innerHTML = 'Error: ' + error.message;
            }
        }

        // Test on load
        window.addEventListener('load', () => {
            console.log('Page loaded, testing connection...');
            testConnection();
        });
    </script>
</body>
</html>
